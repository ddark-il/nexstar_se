name: Refresh bright-comets cache

on:
  schedule:
    # Every Sunday at 06:00 UTC. MPC publishes Soft00Cmt.txt updates weekly.
    - cron: '0 6 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Rebuild data/bright_comets.json
        run: node scripts/build-comets.js
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bright_comets.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh bright comets ($(date -u +%Y-%m-%d))"
            git push
          fi
